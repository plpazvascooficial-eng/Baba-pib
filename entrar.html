<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#0d1b3e"/>
  <title>Arena PIB — Confirmar Presença</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:radial-gradient(ellipse at 30% 0%,#0d1b3e,#080c1a 60%);min-height:100vh;color:#fff;font-family:'Syne',sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px 20px 80px}
    
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulseGold { 0% { box-shadow: 0 0 0 0 #f1c40f66; } 50% { box-shadow: 0 0 20px 5px #f1c40f22; } 100% { box-shadow: 0 0 0 0 #f1c40f66; } }
    .fu {animation:fadeUp 0.5s ease forwards}
    
    /* CAMPEÃO / DESTAQUE */
    .champion-card{width:100%;max-width:420px;background:linear-gradient(135deg, #f1c40f22, #00000000);border:1px solid #f1c40f44;border-radius:22px;padding:20px;margin-bottom:25px;display:flex;align-items:center;gap:15px;animation: pulseGold 3s infinite}
    .champion-photo{width:80px;height:80px;border-radius:50%;border:3px solid #f1c40f;object-fit:cover}
    
    .card{background:rgba(255, 255, 255, 0.03);backdrop-filter: blur(10px);border:1px solid #ffffff14;border-radius:22px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px #00000088}
    .section-label{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
    
    .name-input, .video-input{width:100%;background:#ffffff0d;border:1.5px solid #ffffff18;border-radius:12px;padding:14px 16px;color:#fff;font-family:'Syne',sans-serif;outline:none;margin-bottom:20px}
    .name-input{font-family:'Bebas Neue',sans-serif; font-size:22px;}
    
    .photo-upload-area{width:100%;border:2px dashed #ffffff15;border-radius:12px;padding:16px;text-align:center;cursor:pointer;background:#ffffff05;margin-bottom:20px}
    .player-preview-img{width:70px;height:70px;border-radius:50%;object-fit:cover;margin:0 auto 8px;display:none;border:2px solid #00C2FF}
    
    .pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
    .pos-card{padding:14px 10px;border-radius:14px;border:2px solid #ffffff12;background:#ffffff07;cursor:pointer;text-align:center;transition:0.2s}
    .pos-card.active{border-color:var(--c);background:color-mix(in srgb,var(--c) 18%,transparent)}
    .pos-name{font-family:'Bebas Neue',sans-serif;font-size:16px;color:#aaa}

    .submit-btn{width:100%;padding:18px;border-radius:14px;border:none;background:linear-gradient(135deg,#00C2FF,#0055ff);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;cursor:pointer}
    .submit-btn:disabled{background:#ffffff12;color:#444}

    .player-list{margin-top:28px;width:100%;max-width:420px}
    .player-item{display:flex;align-items:center;gap:12px;background:#ffffff08;border-radius:12px;padding:11px 14px;margin-bottom:8px}
    .player-avatar-img{width:38px;height:38px;border-radius:50%;object-fit:cover}
    .btn-video{background:#ffffff10; color:#fff; border-radius:8px; padding:6px 10px; font-size:12px; text-decoration:none}
  </style>
</head>
<body>

  <!-- SEÇÃO DO CAMPEÃO -->
  <div class="champion-card fu" id="champion-section" style="display: none;">
    <img src="" id="champ-img" class="champion-photo">
    <div>
      <div style="font-size: 10px; color: #f1c40f; font-weight: 800; text-transform: uppercase;">Craque do Último Baba</div>
      <div id="champ-name" style="font-family: 'Bebas Neue', sans-serif; font-size: 24px;">---</div>
    </div>
    <div style="font-size: 30px; margin-left: auto;">👑</div>
  </div>

  <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:#fff;text-align:center" class="fu">ARENA PIB</div>
  <div style="font-size:13px;color:#666;text-align:center;margin-bottom:28px" class="fu">Vale do São Francisco • 2026</div>

  <div class="card fu">
    <div id="form-area">
      <div class="section-label">Seu nome</div>
      <input class="name-input" id="inp-name" placeholder="Ex: Paulo Ricardo">

      <div class="section-label">Sua Foto (Opcional)</div>
      <div class="photo-upload-area" id="area-upload" onclick="document.getElementById('inp-photo').click()">
        <input type="file" id="inp-photo" accept="image/*" style="display:none">
        <img id="prev-img" class="player-preview-img">
        <span id="upload-icon" style="font-size:24px; display:block">📸</span>
        <div id="upload-txt" style="font-size:11px; color:#555; margin-top:5px">Toque para adicionar foto</div>
      </div>

      <div class="section-label">Link de lance/vídeo (Opcional)</div>
      <input class="video-input" id="inp-video" placeholder="Link do lance">

      <div class="section-label">Sua posição</div>
      <div class="pos-grid" id="pos-grid">
        <div class="pos-card" data-pos="Goleiro" style="--c:#FF6B35"><span>🧤</span><div class="pos-name">Goleiro</div></div>
        <div class="pos-card" data-pos="Lateral" style="--c:#F1C40F"><span>🏃</span><div class="pos-name">Lateral</div></div>
        <div class="pos-card" data-pos="Defesa" style="--c:#00C2FF"><span>🛡️</span><div class="pos-name">Defesa</div></div>
        <div class="pos-card" data-pos="Meio-campo" style="--c:#9B59B6"><span>⚙️</span><div class="pos-name">Meio</div></div>
        <div class="pos-card" data-pos="Atacante" style="--c:#2ECC71"><span>🎯</span><div class="pos-name">Atacante</div></div>
      </div>

      <button class="submit-btn" id="submit-btn" disabled>CONFIRMAR PRESENÇA ⚽</button>
    </div>

    <div id="success-area" style="display:none; text-align:center">
        <div style="font-size:50px">🎉</div>
        <div id="success-msg" style="font-family:'Bebas Neue',sans-serif; font-size:24px; color:#2ECC71"></div>
        <p style="font-size:12px; color:#666; margin-top:10px">Presença confirmada!</p>
    </div>
  </div>

  <div class="player-list">
    <div id="player-list-items"></div>
  </div>

<script>
// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDJ3BB-IRyh9DIrDR15qlmWflzra7LGVj0",
  databaseURL: "https://pib-123-default-rtdb.firebaseio.com",
  projectId: "pib-123",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let selectedPos = null;
let playerPhotoB64 = null;
let allPlayers = [];

// Carregar Imagem
document.getElementById("inp-photo").addEventListener("change", function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    playerPhotoB64 = e.target.result;
    document.getElementById("prev-img").src = playerPhotoB64;
    document.getElementById("prev-img").style.display = "block";
    document.getElementById("upload-icon").style.display = "none";
  };
  reader.readAsDataURL(file);
});

// Posição
document.getElementById("pos-grid").addEventListener("click", e => {
  const card = e.target.closest("[data-pos]"); if (!card) return;
  document.querySelectorAll(".pos-card").forEach(c => c.classList.remove("active"));
  card.classList.add("active");
  selectedPos = card.dataset.pos;
  document.getElementById("submit-btn").disabled = !(document.getElementById("inp-name").value.length >= 3 && selectedPos);
});

// Submit
document.getElementById("submit-btn").addEventListener("click", async () => {
  const name = document.getElementById("inp-name").value.trim();
  const existing = allPlayers.find(p => p.name.toLowerCase() === name.toLowerCase());
  
  if (!existing) { alert("Nome não autorizado."); return; }

  await db.ref("jogadores/" + existing.id).update({
    position: selectedPos,
    presente: true,
    photo: playerPhotoB64 || null,
    video: document.getElementById("inp-video").value || null,
    confirmedAt: Date.now()
  });

  document.getElementById("form-area").style.display = "none";
  document.getElementById("success-area").style.display = "block";
  document.getElementById("success-msg").textContent = "BOA, " + existing.name + "!";
});

// Sync com Firebase
db.ref().on("value", snap => {
  const data = snap.val() || {};
  allPlayers = Object.entries(data.jogadores || {}).map(([id, val]) => ({id, ...val}));
  
  // Atualizar Campeão
  if (data.campeao) {
    document.getElementById("champion-section").style.display = "flex";
    document.getElementById("champ-name").textContent = data.campeao.name;
    document.getElementById("champ-img").src = data.campeao.photo || 'https://via.placeholder.com/80';
  }

  // Lista de Presentes
  const presentes = allPlayers.filter(p => p.presente).sort((a,b) => a.confirmedAt - b.confirmedAt);
  const POS_COLORS = {"Goleiro":"#FF6B35","Lateral":"#F1C40F","Defesa":"#00C2FF","Meio-campo":"#9B59B6","Atacante":"#2ECC71"};

  document.getElementById("player-list-items").innerHTML = presentes.map((p, idx) => {
    const c = POS_COLORS[p.position];
    return `
      <div class="player-item fu" style="justify-content: space-between">
        <div style="display:flex; align-items:center; gap:12px">
          <div style="font-size:11px; color:#444">${idx+1}</div>
          ${p.photo ? `<img src="${p.photo}" class="player-avatar-img" style="border:2px solid ${c}">` : `<div style="width:38px;height:38px;background:${c};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold">${p.name[0]}</div>`}
          <div>
            <div style="font-family:'Bebas Neue',sans-serif; font-size:18px">${p.name}</div>
            <div style="font-size:9px; color:${c}; font-weight:700">${p.position}</div>
          </div>
        </div>
        ${p.video ? `<a href="${p.video}" target="_blank" class="btn-video">🎬 Lance</a>` : ''}
      </div>`;
  }).join('');
});
</script>
</body>
</html>
