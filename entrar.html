<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#0d1b3e"/>
  <title>Arena PIB — Confirmar Presença</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:radial-gradient(ellipse at 30% 0%,#0d1b3e,#080c1a 60%);min-height:100vh;color:#fff;font-family:'Syne',sans-serif;display:flex;flex-direction:column;align-items:center;padding:36px 20px 80px}
    
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 #00C2FF44}50%{box-shadow:0 0 0 12px #00C2FF00}}
    .fu {animation:fadeUp 0.5s ease forwards}
    
    .card{background:linear-gradient(145deg,#1a1a2e,#131325);border:1px solid #ffffff14;border-radius:22px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px #00000088}
    .section-label{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
    
    .name-input{width:100%;background:#ffffff0d;border:1.5px solid #ffffff18;border-radius:12px;padding:14px 16px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:22px;outline:none;margin-bottom:20px}
    
    .photo-upload-area{width:100%;border:2px dashed #ffffff15;border-radius:12px;padding:16px;text-align:center;cursor:pointer;background:#ffffff05;position:relative;margin-bottom:20px}
    .player-preview-img{width:70px;height:70px;border-radius:50%;object-fit:cover;margin:0 auto 8px;display:none;border:2px solid #00C2FF}
    
    /* GRID DE POSIÇÕES ATUALIZADO */
    .pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
    .pos-card{padding:14px 10px;border-radius:14px;border:2px solid #ffffff12;background:#ffffff07;cursor:pointer;text-align:center;transition:0.2s}
    .pos-card.active{border-color:var(--c);background:color-mix(in srgb,var(--c) 18%,transparent)}
    .pos-name{font-family:'Bebas Neue',sans-serif;font-size:16px;color:#aaa;margin-top:4px}
    .pos-card.active .pos-name{color:var(--c)}

    .submit-btn{width:100%;padding:18px;border-radius:14px;border:none;background:linear-gradient(135deg,#00C2FF,#0055ff);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;cursor:pointer;animation:pulse 2s infinite}
    .submit-btn:disabled{background:#ffffff12;animation:none;color:#444;cursor:not-allowed}

    .player-list{margin-top:28px;width:100%;max-width:420px}
    .player-item{display:flex;align-items:center;gap:12px;background:#ffffff08;border:1px solid #ffffff0f;border-radius:12px;padding:11px 14px;margin-bottom:8px}
    .player-avatar-img{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .player-initial{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;flex-shrink:0}
  </style>
</head>
<body>

  <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:#fff;margin-bottom:4px;text-align:center" class="fu">ARENA PIB</div>
  <div style="font-size:13px;color:#666;text-align:center;margin-bottom:28px" class="fu">Confirme sua presença no baba</div>

  <div class="card fu">
    <div id="form-area">
      <div class="section-label">Seu nome</div>
      <input class="name-input" id="inp-name" placeholder="Ex: Paulo Ricardo" maxlength="30">

      <div class="section-label">Sua Foto (Opcional)</div>
      <div class="photo-upload-area" id="area-upload">
        <input type="file" id="inp-photo" accept="image/*">
        <img id="prev-img" class="player-preview-img">
        <span id="upload-icon" style="font-size:24px; display:block">📸</span>
        <div id="upload-txt" style="font-size:11px; color:#555; margin-top:5px">Toque para adicionar foto</div>
      </div>

      <div class="section-label">Sua posição</div>
      <div class="pos-grid" id="pos-grid">
        <div class="pos-card" data-pos="Goleiro" style="--c:#FF6B35"><span style="font-size:20px">🧤</span><div class="pos-name">Goleiro</div></div>
        <div class="pos-card" data-pos="Lateral" style="--c:#F1C40F"><span style="font-size:20px">🏃</span><div class="pos-name">Lateral</div></div>
        <div class="pos-card" data-pos="Defesa" style="--c:#00C2FF"><span style="font-size:20px">🛡️</span><div class="pos-name">Defesa</div></div>
        <div class="pos-card" data-pos="Meio-campo" style="--c:#9B59B6"><span style="font-size:20px">⚙️</span><div class="pos-name">Meio</div></div>
        <div class="pos-card" data-pos="Atacante" style="--c:#2ECC71"><span style="font-size:20px">🎯</span><div class="pos-name">Atacante</div></div>
      </div>

      <button class="submit-btn" id="submit-btn" disabled>CONFIRMAR PRESENÇA ⚽</button>
    </div>

    <div id="success-area" style="display:none; text-align:center">
        <div style="font-size:50px">🎉</div>
        <div id="success-msg" style="font-family:'Bebas Neue',sans-serif; font-size:24px; color:#2ECC71"></div>
        <p style="font-size:12px; color:#666; margin-top:10px">Você está na lista!</p>
    </div>
  </div>

  <div class="player-list">
    <div id="player-list-items"></div>
  </div>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyDJ3BB-IRyh9DIrDR15qlmWflzra7LGVj0",
  databaseURL: "https://pib-123-default-rtdb.firebaseio.com",
  projectId: "pib-123",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const playersRef = db.ref("jogadores");

let selectedPos = null;
let playerPhotoB64 = null;
let allPlayers = [];

// --- LÓGICA DE FOTO ---
document.getElementById("inp-photo").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    playerPhotoB64 = event.target.result;
    document.getElementById("prev-img").src = playerPhotoB64;
    document.getElementById("prev-img").style.display = "block";
    document.getElementById("upload-icon").style.display = "none";
    document.getElementById("upload-txt").textContent = "Foto carregada!";
  };
  reader.readAsDataURL(file);
});

// --- UI POSIÇÃO ---
document.getElementById("pos-grid").addEventListener("click", e => {
  const card = e.target.closest("[data-pos]"); if (!card) return;
  document.querySelectorAll(".pos-card").forEach(c => c.classList.remove("active"));
  card.classList.add("active");
  selectedPos = card.dataset.pos;
  checkForm();
});

function checkForm() {
    const name = document.getElementById("inp-name").value.trim();
    document.getElementById("submit-btn").disabled = !(name.length >= 3 && selectedPos);
}
document.getElementById("inp-name").addEventListener("input", checkForm);

// --- SUBMIT ---
document.getElementById("submit-btn").addEventListener("click", async () => {
  const name = document.getElementById("inp-name").value.trim();
  const btn = document.getElementById("submit-btn");
  btn.disabled = true; btn.textContent = "SALVANDO...";

  const existing = allPlayers.find(p => p.name.toLowerCase() === name.toLowerCase());

  if (!existing) {
    alert("Nome não autorizado. Fale com o ADM.");
    btn.disabled = false; btn.textContent = "CONFIRMAR PRESENÇA ⚽";
    return;
  }

  await playersRef.child(existing.id).update({
    position: selectedPos,
    presente: true,
    photo: playerPhotoB64 || null,
    confirmedAt: Date.now()
  });

  document.getElementById("form-area").style.display = "none";
  document.getElementById("success-area").style.display = "block";
  document.getElementById("success-msg").textContent = "BOA, " + existing.name.split(' ')[0] + "!";
});

// --- RENDER LISTA ---
const POS_COLORS = {
    "Goleiro":"#FF6B35",
    "Lateral":"#F1C40F",
    "Defesa":"#00C2FF",
    "Meio-campo":"#9B59B6",
    "Atacante":"#2ECC71"
};

playersRef.on("value", snap => {
  const data = snap.val() || {};
  allPlayers = Object.entries(data).map(([id, val]) => ({id, ...val}));
  
  const presentes = allPlayers
    .filter(p => p.presente === true)
    .sort((a,b) => a.confirmedAt - b.confirmedAt);

  const listEl = document.getElementById("player-list-items");
  listEl.innerHTML = presentes.map((p, idx) => {
    const c = POS_COLORS[p.position] || "#888";
    const avatar = p.photo 
        ? `<img src="${p.photo}" class="player-avatar-img" style="border:2px solid ${c}">`
        : `<div class="player-initial" style="background:linear-gradient(135deg,${c},${c}88)">${p.name.charAt(0)}</div>`;

    return `
      <div class="player-item fu">
        <div style="font-size:11px; color:#444; width:15px">${idx+1}</div>
        ${avatar}
        <div>
          <div style="font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px">${p.name}</div>
          <div style="font-size:9px; color:${c}; text-transform:uppercase; font-weight:700">${p.position}</div>
        </div>
      </div>`;
  }).join('');
});
</script>
</body>
</html>
