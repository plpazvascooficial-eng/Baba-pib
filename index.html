<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#0d1b3e"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Squad Rank ⚽</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:radial-gradient(ellipse at 20% 0%,#0d1b3e,#080c1a 55%);color:#fff;font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:60px}
    input,button{font-family:'Syne',sans-serif}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 #2ECC7144}50%{box-shadow:0 0 0 8px #2ECC7100}}
    .fu{animation:fadeUp 0.35s ease forwards}

    .header{padding:28px 16px 0;background:linear-gradient(180deg,#0d1b3e 80%,transparent);position:sticky;top:0;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:100;border-bottom:1px solid #ffffff0f}
    .header-inner{max-width:640px;margin:0 auto}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;line-height:1;background:linear-gradient(90deg,#fff 40%,#00C2FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .tabs{display:flex;gap:4px;margin-top:14px}
    .tab-btn{flex:1;padding:11px 8px;border:none;background:transparent;color:#555;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1.5px;cursor:pointer;border-radius:10px 10px 0 0;transition:all 0.2s;border-bottom:2px solid transparent;-webkit-appearance:none}
    .tab-btn.active{background:#ffffff10;color:#fff;border-bottom:2px solid #00C2FF}
    .content{max-width:640px;margin:0 auto;padding:18px 14px 80px}
    .btn-add{background:linear-gradient(135deg,#00C2FF,#0060ff);border:none;border-radius:11px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;padding:9px 13px;cursor:pointer;box-shadow:0 4px 20px #00C2FF44;-webkit-appearance:none}
    .btn-share{background:#ffffff0f;border:1px solid #ffffff1a;border-radius:11px;color:#bbb;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;padding:9px 13px;cursor:pointer;-webkit-appearance:none}
    .filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .fbtn{padding:5px 12px;border-radius:7px;border:1.5px solid #ffffff15;background:#ffffff08;color:#666;font-weight:700;font-size:11px;cursor:pointer;-webkit-appearance:none}
    .fbtn.active{border-color:var(--c);background:color-mix(in srgb,var(--c) 25%,transparent);color:var(--c)}
    .player-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px var(--glow);transition:all 0.2s;margin-bottom:8px}
    .player-card.selected{background:color-mix(in srgb,var(--col) 12%,transparent);border-color:var(--col);box-shadow:0 4px 20px var(--glow)}
    .player-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--col),color-mix(in srgb,var(--col) 60%,transparent));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0;font-family:'Bebas Neue',sans-serif;box-shadow:0 0 10px var(--glow)}
    .player-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:#fff;line-height:1}
    .pos-badge{color:#fff;border-radius:5px;padding:2px 7px;font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
    .quality-label{font-size:10px;color:#FFD700bb;font-weight:600}
    .edit-btn{background:#fff1;border:1px solid #fff2;border-radius:7px;color:#aaa;cursor:pointer;font-size:13px;padding:4px 8px}
    .del-btn{background:#f442;border:1px solid #f443;border-radius:7px;color:#f66;cursor:pointer;font-size:13px;padding:4px 8px}
    .check-circle{width:20px;height:20px;border-radius:50%;border:2px solid #444;background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:10px;color:#fff;line-height:1}
    .check-circle.on{background:var(--col);border-color:var(--col)}
    .config-card{background:#ffffff08;border:1px solid #ffffff0f;border-radius:16px;padding:16px;margin-bottom:18px}
    .config-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff;margin-bottom:14px}
    .section-label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .num-btns{display:flex;gap:8px;margin-bottom:14px}
    .num-btn{padding:8px 20px;border-radius:10px;border:2px solid #ffffff18;background:#ffffff08;color:#666;font-family:'Bebas Neue',sans-serif;font-size:22px;cursor:pointer;transition:all 0.15s;-webkit-appearance:none}
    .num-btn.active{border-color:#00C2FF;background:#00C2FF22;color:#00C2FF}
    .selection-info{display:flex;align-items:center;justify-content:space-between;background:#00C2FF0d;border:1px solid #00C2FF22;border-radius:10px;padding:10px 14px;margin-bottom:10px}
    .draw-btn{width:100%;padding:16px;border-radius:14px;border:none;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;cursor:pointer;margin-bottom:24px;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;-webkit-appearance:none}
    .draw-btn.ready{background:linear-gradient(135deg,#00C2FF,#0055ff);color:#fff;box-shadow:0 6px 30px #00C2FF44}
    .draw-btn.disabled{background:#ffffff0d;color:#444;cursor:not-allowed}
    .spinner{width:20px;height:20px;border:3px solid #fff4;border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
    .quality-bar-card{background:#ffffff08;border:1px solid #ffffff0f;border-radius:12px;padding:14px 16px;margin-bottom:18px}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .bar-track{flex:1;height:8px;background:#ffffff0d;border-radius:4px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(.22,1,.36,1)}
    .teams-grid{display:grid;gap:12px;margin-bottom:14px}
    .team-card{background:linear-gradient(145deg,#14142a,#1a1a34);border:2px solid var(--tc);border-radius:16px;overflow:hidden}
    .reshuffle-btn{width:100%;padding:12px;border-radius:12px;border:1px solid #ffffff18;background:#ffffff08;color:#aaa;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;-webkit-appearance:none}
    .overlay{position:fixed;inset:0;background:#000c;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
    .modal{background:linear-gradient(145deg,#1a1a2e,#12122a);border:1px solid #ffffff18;border-radius:20px;padding:26px 22px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
    .modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:#fff;margin-bottom:20px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .field input{width:100%;background:#ffffff0d;border:1px solid #ffffff18;border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;outline:none}
    .pos-btns{display:flex;gap:7px;flex-wrap:wrap}
    .pos-btn{padding:7px 12px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;transition:all 0.15s;-webkit-appearance:none}
    .modal-actions{display:flex;gap:10px;margin-top:22px}
    .cancel-btn{flex:1;padding:11px;border-radius:10px;border:1px solid #ffffff18;background:#ffffff0d;color:#666;font-weight:700;font-size:14px;cursor:pointer;-webkit-appearance:none}
    .save-btn{flex:2;padding:11px;border-radius:10px;border:none;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1.5px;cursor:pointer;-webkit-appearance:none}
    .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
    .big-spinner{width:36px;height:36px;border:4px solid #ffffff0d;border-top-color:#00C2FF;border-radius:50%;animation:spin 0.8s linear infinite}
    .empty{text-align:center;padding:60px 20px;color:#444}
    .pending-badge{font-size:9px;background:#FFD70020;color:#FFD700;border-radius:4px;padding:2px 8px;font-weight:700;letter-spacing:0.5px}
    .live-dot{width:7px;height:7px;border-radius:50%;background:#2ECC71;animation:pulse 1.5s infinite;display:inline-block;margin-right:4px}
  </style>
</head>
<body>
<div id="app"><div class="loading-screen"><div class="big-spinner"></div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#555">CARREGANDO...</div></div></div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDJ3BB-IRyh9DIrDR15qlmWflzra7LGVj0",
  authDomain: "pib-123.firebaseapp.com",
  databaseURL: "https://pib-123-default-rtdb.firebaseio.com",
  projectId: "pib-123",
  storageBucket: "pib-123.firebasestorage.app",
  messagingSenderId: "652801707789",
  appId: "1:652801707789:web:ac51161bb9845a2400ea44"
});
const db = firebase.database();
const playersRef = db.ref("jogadores");

const POSITIONS = ["Goleiro","Defesa","Meio-campo","Atacante"];
const POS_COLORS = {"Goleiro":{bg:"#FF6B35",glow:"#FF6B3530"},"Defesa":{bg:"#00C2FF",glow:"#00C2FF30"},"Meio-campo":{bg:"#9B59B6",glow:"#9B59B630"},"Atacante":{bg:"#2ECC71",glow:"#2ECC7130"}};
const QUALITY_LABELS = {1:"Fraco",2:"Regular",3:"Bom",4:"Ótimo",5:"Elite"};
const TEAM_THEMES = [{name:"Time A",color:"#FF4444",emoji:"🔴"},{name:"Time B",color:"#4488FF",emoji:"🔵"},{name:"Time C",color:"#44CC44",emoji:"🟢"},{name:"Time D",color:"#FFB800",emoji:"🟡"}];
const POS_WEIGHT = {"Goleiro":5,"Meio-campo":4,"Defesa":3,"Atacante":3};

let state = {tab:"jogadores",players:[],loading:true,modal:null,filterPos:"Todos",numTeams:2,selected:new Set(),drawn:null,drawing:false,presenca:new Set()};

function playerScore(p){const w=POS_WEIGHT[p.position]||3;return Math.round((p.quality||0)*w/5*10)/10;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function balancedDraw(players,n){
  const teams=TEAM_THEMES.slice(0,n).map(t=>({...t,players:[],total:0}));
  const byPos={};
  // Adiciona ruido aleatorio pequeno para quebrar empates de nota
  players.forEach(p=>{if(!byPos[p.position])byPos[p.position]=[];byPos[p.position].push({...p,_score:playerScore(p)+Math.random()*0.4});});
  // Ordena por score (nota+posicao+ruido) decrescente dentro de cada posicao
  Object.keys(byPos).forEach(pos=>{byPos[pos]=byPos[pos].sort((a,b)=>b._score-a._score);});
  Object.keys(byPos).forEach(pos=>{
    const group=byPos[pos];
    for(let i=0;i<group.length;i++){
      // Sempre coloca no time com menor total no momento
      const ti=[...Array(n).keys()].sort((a,b)=>teams[a].total-teams[b].total)[0];
      teams[ti].players.push(group[i]);
      teams[ti].total=Math.round((teams[ti].total+group[i]._score)*10)/10;
    }
  });
  return teams;
}
function posColor(pos){return POS_COLORS[pos]||{bg:"#888",glow:"#88888830"};}
function stars(val){return[1,2,3,4,5].map(s=>`<span style="font-size:16px;color:${s<=(val||0)?'#FFD700':'#2a2a3a'};text-shadow:${s<=(val||0)?'0 0 8px #FFD70099':'none'}">★</span>`).join('');}

function playerCardHTML(p,selectable=false){
  const c=posColor(p.position);const sel=selectable&&state.selected.has(p.id);
  const pending=!p.quality||p.quality===0;
  const starsHTML=pending
    ?`<div style="margin-top:4px"><span class="pending-badge">⏳ SEM NOTA</span></div>`
    :`<div style="display:flex;align-items:center;gap:6px;margin-top:3px">${stars(p.quality)}<span class="quality-label">${QUALITY_LABELS[p.quality]}</span></div>`;
  return `<div class="player-card ${sel?'selected':''}" style="--col:${c.bg};--glow:${c.glow};--border:${sel?c.bg:pending?'#FFD70040':c.bg+'35'};cursor:${selectable?'pointer':'default'}" data-action="${selectable?'toggle':''}" data-id="${p.id}">
    ${selectable?`<div class="check-circle ${sel?'on':''}" style="--col:${c.bg}">${sel?'✓':''}</div>`:''}
    <div class="player-avatar" style="--col:${c.bg};--glow:${c.glow}">${p.name.charAt(0)}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        <span class="player-name">${p.name}</span>
        <span class="pos-badge" style="background:${c.bg}">${p.position}</span>
      </div>
      ${starsHTML}
    </div>
    ${!selectable?`<div style="display:flex;gap:5px;flex-shrink:0">
      ${pending?`<button style="background:#FFD70020;border:1px solid #FFD70040;border-radius:7px;color:#FFD700;cursor:pointer;font-size:11px;padding:5px 9px;font-weight:700;white-space:nowrap;-webkit-appearance:none" data-action="edit" data-id="${p.id}">⭐ AVALIAR</button>`:''}
      <button class="edit-btn" data-action="edit" data-id="${p.id}">✏️</button>
      <button class="del-btn" data-action="delete" data-id="${p.id}">🗑</button>
    </div>`:''}
  </div>`;
}

function modalHTML(){
  const p=state.modal;const pos=p?.position||"Goleiro";const c=posColor(pos);
  return `<div class="overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title">${p?.id?'✏️ Editar':'➕ Novo'} Jogador</div>
      <div class="field"><label>Nome</label><input id="f-name" value="${p?.name||''}" placeholder="Ex: Neymar Jr" style="border-color:#ffffff18" onfocus="this.style.borderColor='${c.bg}88'" onblur="this.style.borderColor='#ffffff18'"/></div>
      <div class="field"><label>Clube</label><input id="f-club" value="${p?.club||''}" placeholder="Ex: Al-Hilal" style="border-color:#ffffff18" onfocus="this.style.borderColor='${c.bg}88'" onblur="this.style.borderColor='#ffffff18'"/></div>
      <div class="field"><label>Posição</label><div class="pos-btns">${POSITIONS.map(pos2=>{const c2=posColor(pos2);const act=pos2===(p?.position||"Goleiro");return `<button class="pos-btn" data-action="setpos" data-pos="${pos2}" style="border:1.5px solid ${act?c2.bg:'#ffffff18'};background:${act?c2.bg+'30':'#ffffff08'};color:${act?c2.bg:'#666'}">${pos2}</button>`;}).join('')}</div></div>
      <div class="field"><label>Nota — <span style="color:#FFD700">${QUALITY_LABELS[p?.quality||0]||'Selecione'}</span></label>
        <div style="display:flex;gap:8px">${[1,2,3,4,5].map(s=>`<button data-action="setquality" data-q="${s}" style="background:none;border:none;cursor:pointer;font-size:30px;padding:4px;color:${s<=(p?.quality||0)?'#FFD700':'#2a2a3a'};text-shadow:${s<=(p?.quality||0)?'0 0 10px #FFD70099':'none'};transition:all 0.15s">★</button>`).join('')}</div>
      </div>
      <div class="modal-actions">
        <button class="cancel-btn" data-action="closemodal">Cancelar</button>
        <button class="save-btn" data-action="savemodal" style="background:linear-gradient(135deg,${c.bg},${c.bg}bb);box-shadow:0 4px 20px ${c.glow}">SALVAR</button>
      </div>
    </div>
  </div>`;
}

function render(){
  const {tab,players,loading,filterPos,numTeams,selected,drawn,drawing,presenca}=state;
  const presencaCount=presenca.size;
  if(loading){document.getElementById("app").innerHTML=`<div class="loading-screen"><div class="big-spinner"></div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#555">CARREGANDO...</div></div>`;return;}
  const selPlayers=(presenca.size>0?players.filter(p=>presenca.has(p.id)):players).filter(p=>selected.has(p.id));
  const selAvg=selPlayers.length?(selPlayers.reduce((s,p)=>s+(p.quality||0),0)/selPlayers.length).toFixed(1):"0";
  const filteredPlayers=filterPos==="Todos"?players:players.filter(p=>p.position===filterPos);
  const pendingCount=players.filter(p=>!p.quality||p.quality===0).length;

  let html=`<div class="header"><div class="header-inner">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:2px">
      <div>
        <div class="logo">⚽ SQUAD RANK</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:3px">
          <span style="font-size:11px;color:#555;letter-spacing:1px;text-transform:uppercase">${players.length} jogadores</span>
          <span style="font-size:10px;font-weight:700;color:#2ECC71"><span class="live-dot"></span>AO VIVO</span>
        </div>
      </div>
      <div style="display:flex;gap:7px;align-items:center">
        <button class="btn-share" data-action="share">📲 CONVIDAR</button>
        ${tab==="jogadores"?`<button class="btn-add" data-action="openmodal">+ ADD</button>`:''}
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn ${tab==='jogadores'?'active':''}" data-action="tab" data-tab="jogadores">👤 ELENCO${pendingCount>0?` <span style="background:#FFD700;color:#000;border-radius:10px;padding:1px 6px;font-size:10px">${pendingCount}</span>`:''}</button>
      <button class="tab-btn ${tab==='presenca'?'active':''}" data-action="tab" data-tab="presenca">✅ PRESENÇA<span style="background:#2ECC71;color:#000;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px">${presencaCount}</span></button>
      <button class="tab-btn ${tab==='sorteio'?'active':''}" data-action="tab" data-tab="sorteio">⚽ SORTEAR</button>
    </div>
  </div></div><div class="content">`;

  if(tab==="jogadores"){
    html+=`<div class="filter-bar"><button class="fbtn ${filterPos==='Todos'?'active':''}" style="--c:#00C2FF" data-action="filter" data-pos="Todos">Todos</button>${POSITIONS.map(pos=>{const c=posColor(pos);return `<button class="fbtn ${filterPos===pos?'active':''}" style="--c:${c.bg}" data-action="filter" data-pos="${pos}">${pos}</button>`;}).join('')}</div>`;
    if(!filteredPlayers.length){html+=`<div class="empty"><div style="font-size:40px;margin-bottom:12px">⚽</div><div style="font-weight:700;font-size:15px">Nenhum jogador ainda</div></div>`;}
    else filteredPlayers.forEach(p=>{html+=playerCardHTML(p,false);});
  }

  if(tab==="presenca"){
    const confirmedPlayers=players.filter(p=>presenca.has(p.id));
    const pendingPlayers=players.filter(p=>!presenca.has(p.id));
    html+=`<div class="config-card">
      <div class="config-title">✅ CONFIRMADOS HOJE <span style="font-size:16px;color:#2ECC71">${confirmedPlayers.length}</span></div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <button class="fbtn" data-action="presenca-all" style="--c:#2ECC71">✅ Marcar todos</button>
        <button class="fbtn" data-action="presenca-none" style="--c:#f66">❌ Limpar</button>
      </div>
      ${confirmedPlayers.length===0?'<div style="color:#444;font-size:13px;text-align:center;padding:10px">Ninguém confirmado ainda</div>':confirmedPlayers.map(p=>{const c=posColor(p.position);return `<div class="player-card" style="--col:${c.bg};--glow:${c.glow};--border:${c.bg};background:color-mix(in srgb,${c.bg} 10%,transparent);margin-bottom:8px;cursor:pointer" data-action="toggle-presenca" data-id="${p.id}">
        <div style="width:20px;height:20px;border-radius:50%;background:#2ECC71;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">✓</div>
        <div class="player-avatar" style="--col:${c.bg};--glow:${c.glow}">${p.name.charAt(0)}</div>
        <div style="flex:1"><span class="player-name">${p.name}</span><span class="pos-badge" style="background:${c.bg};margin-left:6px">${p.position}</span></div>
      </div>`;}).join('')}
    </div>`;
    if(pendingPlayers.length>0){
      html+=`<div class="section-label" style="margin-bottom:10px">NÃO CONFIRMADOS</div>`;
      pendingPlayers.forEach(p=>{const c=posColor(p.position);html+=`<div class="player-card" style="--col:${c.bg};--glow:${c.glow};--border:#ffffff15;cursor:pointer;opacity:0.5" data-action="toggle-presenca" data-id="${p.id}">
        <div style="width:20px;height:20px;border-radius:50%;border:2px solid #444;flex-shrink:0"></div>
        <div class="player-avatar" style="--col:${c.bg};--glow:${c.glow}">${p.name.charAt(0)}</div>
        <div style="flex:1"><span class="player-name">${p.name}</span><span class="pos-badge" style="background:${c.bg};margin-left:6px">${p.position}</span></div>
      </div>`;});
    }
  }

  if(tab==="sorteio"){
    const sorteioPl2=presenca.size>0?players.filter(p=>presenca.has(p.id)):players;
    const canDraw=sorteioPl2.filter(p=>selected.has(p.id)&&p.quality>0).length>=numTeams;
    html+=`<div class="config-card"><div class="config-title">⚙️ CONFIGURAR SORTEIO</div>
      <div class="section-label">Número de times</div>
      <div class="num-btns">${[2,3,4].map(n=>`<button class="num-btn ${numTeams===n?'active':''}" data-action="numteams" data-n="${n}">${n}</button>`).join('')}</div>
      <div class="selection-info">
        <div><span style="font-size:13px;font-weight:700;color:#00C2FF">${selPlayers.length} selecionados</span><span style="font-size:11px;color:#555;margin-left:6px">(mín. ${numTeams} com nota)</span></div>
        <span style="font-size:11px;color:#aaa">média <span style="color:#FFD700">★</span> ${selAvg}</span>
      </div>
      <div style="display:flex;gap:8px"><button class="fbtn" data-action="selall">✅ Todos</button><button class="fbtn" data-action="selnone">☐ Nenhum</button></div>
    </div>
    <div class="section-label" style="margin-bottom:10px">Toque para incluir/excluir</div>`;
    const sorteioPl=presenca.size>0?players.filter(p=>presenca.has(p.id)):players;
    sorteioPl.forEach(p=>{html+=playerCardHTML(p,true);});
    html+=`<button class="draw-btn ${canDraw?'ready':'disabled'}" data-action="draw" ${!canDraw?'disabled':''}>${drawing?`<div class="spinner"></div> SORTEANDO...`:'⚽ SORTEAR TIMES EQUILIBRADOS'}</button>`;

    if(drawn&&!drawing){
      const maxPts=Math.max(...drawn.map(t=>t.total),1);
      html+=`<div class="quality-bar-card fu"><div class="section-label">Equilíbrio</div>${drawn.map(t=>`<div class="bar-row"><span style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:${t.color};width:58px;letter-spacing:1px">${t.name}</span><div class="bar-track"><div class="bar-fill" style="width:${(t.total/maxPts)*100}%;background:linear-gradient(90deg,${t.color},${t.color}88)"></div></div><span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:#FFD700;width:26px;text-align:right">${t.total}</span></div>`).join('')}</div>
      <div class="teams-grid fu" style="grid-template-columns:${numTeams===2?'1fr 1fr':'1fr'}">
      ${drawn.map(t=>{const avg=t.players.length?(t.total/t.players.length).toFixed(1):"0";return `<div class="team-card" style="--tc:${t.color}44">
        <div style="background:linear-gradient(135deg,${t.color}33,${t.color}11);padding:13px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid ${t.color}44">
          <div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">${t.emoji}</span><div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:${t.color};line-height:1">${t.name}</div><div style="font-size:11px;color:#777;margin-top:1px">${t.players.length} jogadores</div></div></div>
          <div><div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:#FFD700;line-height:1;text-align:right">${t.total}</div><div style="font-size:10px;color:#666;text-align:right">pts · média ${avg}</div></div>
        </div>
        <div style="padding:11px 14px;display:flex;flex-direction:column;gap:7px">
          ${t.players.map(p=>{const c=posColor(p.position);return `<div style="display:flex;align-items:center;gap:10px"><div style="width:6px;height:6px;border-radius:50%;background:${c.bg};flex-shrink:0"></div><span style="font-size:13px;font-weight:700;color:#ddd;flex:1">${p.name}</span><span style="font-size:9px;background:${c.bg}33;color:${c.bg};border-radius:4px;padding:2px 6px;font-weight:700">${p.position.substring(0,3).toUpperCase()}</span><div>${[1,2,3,4,5].map(s=>`<span style="font-size:11px;color:${s<=(p.quality||0)?'#FFD700':'#2a2a2a'}">★</span>`).join('')}</div></div>`;}).join('')}
        </div>
      </div>`;}).join('')}
      </div><button class="reshuffle-btn" data-action="draw">🔄 RESSORTEAR</button>`;
    }
  }
  html+=`</div>`;
  if(state.modal!==null) html+=modalHTML();
  document.getElementById("app").innerHTML=html;
}

function getModalFields(){return{name:(document.getElementById("f-name")?.value||"").trim(),club:(document.getElementById("f-club")?.value||"").trim(),position:state.modal?.position||"Goleiro",quality:state.modal?.quality||0};}

document.addEventListener("click",e=>{
  const el=e.target.closest("[data-action]");if(!el)return;
  const action=el.dataset.action,id=el.dataset.id;
  if(action==="tab"){state.tab=el.dataset.tab;state.drawn=null;render();}
  else if(action==="filter"){state.filterPos=el.dataset.pos;render();}
  else if(action==="openmodal"){state.modal={position:"Goleiro",quality:0};render();}
  else if(action==="closemodal"){state.modal=null;render();}
  else if(action==="edit"){state.modal={...state.players.find(p=>p.id===id)};render();}
  else if(action==="delete"){if(confirm("Remover jogador?")){playersRef.child(id).remove();state.selected.delete(id);}}
  else if(action==="toggle"){if(state.selected.has(id))state.selected.delete(id);else state.selected.add(id);render();}
  else if(action==="setpos"){state.modal={...state.modal,...getModalFields(),position:el.dataset.pos};render();}
  else if(action==="setquality"){state.modal={...state.modal,...getModalFields(),quality:parseInt(el.dataset.q)};render();}
  else if(action==="savemodal"){
    const d=getModalFields();if(!d.name)return;
    if(state.modal?.id){playersRef.child(state.modal.id).update(d);}
    else{playersRef.push(d);}
    state.modal=null;render();
  }
  else if(action==="numteams"){state.numTeams=parseInt(el.dataset.n);state.drawn=null;render();}
  else if(action==="selall"){state.selected=new Set(state.players.map(p=>p.id));render();}
  else if(action==="selnone"){state.selected=new Set();render();}
  else if(action==="draw"){
    const pool=state.players.filter(p=>state.selected.has(p.id)&&p.quality>0);
    if(pool.length<state.numTeams)return;
    state.drawing=true;render();
    setTimeout(()=>{state.drawn=balancedDraw(pool,state.numTeams);state.drawing=false;render();},900);
  }
  else if(action==="toggle-presenca"){if(state.presenca.has(id))state.presenca.delete(id);else state.presenca.add(id);render();}
  else if(action==="presenca-all"){state.presenca=new Set(state.players.map(p=>p.id));render();}
  else if(action==="presenca-none"){state.presenca=new Set();render();}
  else if(action==="share"){
    const url=location.href.replace("index.html","")+"entrar.html";
    if(navigator.share){navigator.share({title:"Squad Rank ⚽",text:"Entre no baba!",url});}
    else{navigator.clipboard.writeText(url).then(()=>alert("Link copiado!\n"+url)).catch(()=>alert(url));}
  }
  if(el.id==="modal-overlay"){state.modal=null;render();}
});

// REALTIME LISTENER
playersRef.on("value",snapshot=>{
  const data=snapshot.val()||{};
  state.players=Object.entries(data).map(([id,p])=>({id,...p})).sort((a,b)=>a.name.localeCompare(b.name));
  state.players.forEach(p=>state.selected.add(p.id));
  state.loading=false;
  render();
});
</script>
</body>
</html>
